<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Tracker">
<meta name="theme-color" content="#0a0a0f">
<title>Life Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --muted: #6b6b80;
  --accent: #7c6fff;
  --accent2: #4ade80;
  --accent3: #fb923c;
  --accent4: #38bdf8;
  --done-bg: rgba(74,222,128,0.1);
  --done-border: rgba(74,222,128,0.3);
  --radius: 14px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior: none;
}

/* APP SHELL */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* HEADER */
.header {
  padding: 52px 20px 16px;
  flex-shrink: 0;
  background: var(--bg);
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; }
.app-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
.app-title span { color: var(--accent); }
.date-chip {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 99px;
  padding: 4px 10px;
  margin-top: 4px;
}

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 20px 16px;
  flex-shrink: 0;
}
.stat-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.stat-num { font-size: 18px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.progress-track { height: 3px; background: var(--surface2); border-radius: 99px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }

/* TABS */
.tabs {
  display: flex;
  padding: 0 20px;
  gap: 4px;
  flex-shrink: 0;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 0;
}
.tab {
  flex: 1;
  padding: 10px 4px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -0.5px;
  transition: color 0.15s;
  letter-spacing: 0.02em;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-icon { display: block; font-size: 16px; margin-bottom: 2px; }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 20px;
  padding-bottom: calc(20px + var(--safe-bottom));
}
.scroll-area::-webkit-scrollbar { display: none; }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* SECTION LABEL */
.sec-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 16px 0 8px;
}
.sec-label:first-child { margin-top: 0; }

/* ITEM ROW */
.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-user-select: none;
  user-select: none;
}
.item:active { transform: scale(0.98); }
.item.done {
  background: var(--done-bg);
  border-color: var(--done-border);
}
.check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  font-size: 12px;
}
.item.done .check {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #052e16;
}
.item-body { flex: 1; min-width: 0; }
.item-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.item.done .item-title {
  color: var(--accent2);
  text-decoration: line-through;
  text-decoration-color: rgba(74,222,128,0.5);
}
.item-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  font-family: 'DM Mono', monospace;
}
.item.done .item-sub { color: rgba(74,222,128,0.5); }
.badge {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 3px 7px;
  border-radius: 99px;
  border: 0.5px solid;
  flex-shrink: 0;
  white-space: nowrap;
}
.b-purple { color: var(--accent); border-color: rgba(124,111,255,0.3); background: rgba(124,111,255,0.1); }
.b-green  { color: var(--accent2); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.1); }
.b-orange { color: var(--accent3); border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.1); }
.b-blue   { color: var(--accent4); border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.1); }
.b-gray   { color: var(--muted); border-color: var(--border2); background: var(--surface2); }

/* DAY HEADER */
.day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 16px 0 6px;
}
.day-header:first-child { margin-top: 0; }
.day-name { font-size: 14px; font-weight: 700; }

/* CARRY NOTE */
.carry-note {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--accent4);
  background: rgba(56,189,248,0.08);
  border: 0.5px solid rgba(56,189,248,0.2);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  margin-bottom: 6px;
}

/* DASHBOARD NEXT */
.next-empty {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  padding: 20px 0;
  font-family: 'DM Mono', monospace;
}
.streak-bar {
  display: flex;
  gap: 5px;
  margin: 4px 0 16px;
}
.streak-dot {
  flex: 1;
  height: 4px;
  border-radius: 99px;
  background: var(--surface2);
}
.streak-dot.done { background: var(--accent); }

/* RESET AREA */
.reset-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn-reset {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 99px;
  padding: 6px 14px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-reset:hover { color: var(--text); border-color: var(--border2); }

/* INSTALL BANNER */
.install-banner {
  background: rgba(124,111,255,0.1);
  border: 0.5px solid rgba(124,111,255,0.25);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 12px;
  color: rgba(240,240,245,0.8);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.install-banner strong { color: var(--accent); font-weight: 700; }
.install-close {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  padding: 0 0 0 6px;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">Life<span>.</span></div>
        <div class="app-title" style="color:var(--muted);font-size:14px;font-weight:400;margin-top:2px">tracker</div>
      </div>
      <div class="date-chip" id="date-chip"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="s-routine" style="color:var(--accent)">0/13</div>
      <div class="stat-label">routine</div>
      <div class="progress-track"><div class="progress-fill" id="p-routine" style="background:var(--accent);width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="s-workout" style="color:var(--accent4)">0/20</div>
      <div class="stat-label">workout</div>
      <div class="progress-track"><div class="progress-fill" id="p-workout" style="background:var(--accent4);width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="s-menu" style="color:var(--accent2)">0/26</div>
      <div class="stat-label">pasti</div>
      <div class="progress-track"><div class="progress-fill" id="p-menu" style="background:var(--accent2);width:0%"></div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('dash',this)">
      <span class="tab-icon">⚡</span>Oggi
    </button>
    <button class="tab" onclick="showTab('routine',this)">
      <span class="tab-icon">🕐</span>Routine
    </button>
    <button class="tab" onclick="showTab('workout',this)">
      <span class="tab-icon">💪</span>Workout
    </button>
    <button class="tab" onclick="showTab('menu',this)">
      <span class="tab-icon">🥗</span>Menu
    </button>
  </div>

  <div class="scroll-area">

    <!-- DASHBOARD -->
    <div id="tab-dash" class="page active">
      <div id="install-banner" class="install-banner">
        <span>📲</span>
        <span><strong>Installa l'app!</strong> Su iPhone: tocca Condividi → "Aggiungi a schermata Home". Su Android: tocca ⋮ → "Installa app".</span>
        <button class="install-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
      </div>
      <div class="sec-label">Streak settimana</div>
      <div class="streak-bar" id="streak-bar"></div>
      <div class="sec-label">Prossimi slot — routine di oggi</div>
      <div id="dash-next"></div>
      <div class="reset-row">
        <button class="btn-reset" onclick="resetSection('routine')">↺ Reset routine</button>
        <button class="btn-reset" onclick="resetSection('workout')">↺ Reset workout</button>
        <button class="btn-reset" onclick="resetSection('menu')">↺ Reset menu</button>
        <button class="btn-reset" onclick="resetAll()" style="color:#f87171;border-color:rgba(248,113,113,0.3)">✕ Reset tutto</button>
      </div>
    </div>

    <!-- ROUTINE -->
    <div id="tab-routine" class="page">
      <div id="routine-list"></div>
    </div>

    <!-- WORKOUT -->
    <div id="tab-workout" class="page">
      <div id="workout-list"></div>
    </div>

    <!-- MENU -->
    <div id="tab-menu" class="page">
      <div id="menu-list"></div>
    </div>

  </div>
</div>

<script>
const ROUTINE = [
  {id:'r0',time:'08:00',title:'Sveglia — no telefono',sub:'500ml acqua subito',badge:'Mattina',bc:'b-orange'},
  {id:'r1',time:'08:00–08:20',title:'Allenamento 20 min',sub:'A casa — vedi tab Workout',badge:'Sport',bc:'b-blue'},
  {id:'r2',time:'08:20–08:45',title:'Doccia + preparazione',sub:'Dopo lo sport',badge:'Mattina',bc:'b-orange'},
  {id:'r3',time:'08:45–09:00',title:'Colazione',sub:'Yogurt + frutta oppure uova',badge:'Cibo',bc:'b-green'},
  {id:'r4',time:'09:00–13:00',title:'Lavoro — blocco 1',sub:'Pomodoro: 50 min focus, 10 min pausa',badge:'Lavoro',bc:'b-gray'},
  {id:'r5',time:'13:00–14:00',title:'Pranzo + pausa vera',sub:'Cibo da casa, niente schermo',badge:'Cibo',bc:'b-green'},
  {id:'r6',time:'14:00–17:00',title:'Lavoro — blocco 2',sub:'Task meccanici nel pomeriggio',badge:'Lavoro',bc:'b-gray'},
  {id:'r7',time:'17:00–18:30',title:'Stacco',sub:'Relax — non studiare subito',badge:'Relax',bc:'b-orange'},
  {id:'r8',time:'18:30–20:00',title:'Studio business',sub:'1 argomento per sessione',badge:'Business',bc:'b-purple'},
  {id:'r9',time:'20:00–21:00',title:'Cena + cucina domani',sub:'Cuoci il doppio — metà in frigo',badge:'Cibo',bc:'b-green'},
  {id:'r10',time:'21:00–21:30',title:'Riflessione serale',sub:'Diario 5 min + obiettivi + lettura',badge:'Mente',bc:'b-purple'},
  {id:'r11',time:'22:30',title:'Spegni i dispositivi',sub:'No social — dormi entro 23:30',badge:'Sera',bc:'b-gray'},
  {id:'r12',time:'23:00–23:30',title:'Sonno — min 7 ore',sub:'Senza riposo niente funziona',badge:'Sera',bc:'b-gray'},
];

const WORKOUT = [
  {day:'Lunedì',type:'Forza superiore',bc:'b-blue',ex:[
    {id:'w0a',name:'Push-up',sets:'4 × 12–15'},
    {id:'w0b',name:'Dips alla panca/macchinario',sets:'4 × 10–12'},
    {id:'w0c',name:'Pike push-up (spalle)',sets:'3 × 10'},
    {id:'w0d',name:'Plank',sets:'3 × 45 sec'},
  ]},
  {day:'Martedì',type:'Cardio + core',bc:'b-green',ex:[
    {id:'w1a',name:'Jumping jacks',sets:'3 × 45 sec'},
    {id:'w1b',name:'Mountain climbers',sets:'3 × 30 sec'},
    {id:'w1c',name:'Burpees',sets:'3 × 8'},
    {id:'w1d',name:'Crunch + leg raise',sets:'3 × 15'},
  ]},
  {day:'Mercoledì',type:'Forza inferiore',bc:'b-blue',ex:[
    {id:'w2a',name:'Squat a corpo libero',sets:'4 × 15–20'},
    {id:'w2b',name:'Affondi alternati',sets:'3 × 12/gamba'},
    {id:'w2c',name:'Glute bridge (su panca)',sets:'4 × 15'},
    {id:'w2d',name:'Calf raise',sets:'3 × 20'},
  ]},
  {day:'Giovedì',type:'Riposo attivo',bc:'b-gray',ex:[
    {id:'w3a',name:'Camminata 20–30 min',sets:'—'},
    {id:'w3b',name:'Stretching / mobilità',sets:'15–20 min'},
  ]},
  {day:'Venerdì',type:'Full body',bc:'b-blue',ex:[
    {id:'w4a',name:'Push-up stretti (tricipiti)',sets:'3 × 12'},
    {id:'w4b',name:'Dips pesanti (fase neg. lenta)',sets:'4 × 8–10'},
    {id:'w4c',name:'Squat jump',sets:'3 × 10'},
    {id:'w4d',name:'Plank laterale',sets:'3 × 30 sec/lato'},
  ]},
  {day:'Sabato',type:'Cardio libero',bc:'b-green',ex:[
    {id:'w5a',name:'Corsa / bici / nuoto / camminata',sets:'30–40 min'},
  ]},
  {day:'Domenica',type:'Riposo completo',bc:'b-gray',ex:[
    {id:'w6a',name:'Recupero muscolare e mentale',sets:'—'},
  ]},
];

const MENU = [
  {day:'Domenica',bc:'b-orange',meals:[
    {id:'m0a',pasto:'Pranzo',food:'Libero — pasto premio',note:'Giorno flessibile',carry:null},
    {id:'m0b',pasto:'Cena',food:'Pasta al pomodoro + insalata',note:'100g cruda — cuoci il DOPPIO',carry:'📦 Porta lunedì: pasta al pomodoro'},
  ]},
  {day:'Lunedì',bc:'b-blue',meals:[
    {id:'m1a',pasto:'Colazione',food:'Yogurt greco 0% + frutta + gallette',note:'150g yogurt',carry:null},
    {id:'m1b',pasto:'Pranzo',food:'Pasta al pomodoro (da domenica)',note:'Da frigo — scalda al micro',carry:null},
    {id:'m1c',pasto:'Cena',food:'Pollo alla piastra + zucchine grigliate',note:'300–360g — cuoci il DOPPIO',carry:'📦 Porta martedì: pollo + zucchine'},
  ]},
  {day:'Martedì',bc:'b-green',meals:[
    {id:'m2a',pasto:'Colazione',food:'2–3 uova strapazzate + pomodoro crudo',note:'3 min in padella',carry:null},
    {id:'m2b',pasto:'Pranzo',food:'Pollo + zucchine (da lunedì)',note:'Da frigo',carry:null},
    {id:'m2c',pasto:'Cena',food:'Riso saltato con verdure + uovo',note:'100g crudo — cuoci il DOPPIO',carry:'📦 Porta mercoledì: riso con verdure'},
  ]},
  {day:'Mercoledì',bc:'b-blue',meals:[
    {id:'m3a',pasto:'Colazione',food:'Yogurt greco 0% + banana + gallette',note:'150g yogurt',carry:null},
    {id:'m3b',pasto:'Pranzo',food:'Riso con verdure e uovo (da martedì)',note:'Da frigo',carry:null},
    {id:'m3c',pasto:'Cena',food:'Macinato con cipolla e pomodoro',note:'300–360g — cuoci il DOPPIO',carry:'📦 Porta giovedì: macinato + insalata'},
  ]},
  {day:'Giovedì',bc:'b-green',meals:[
    {id:'m4a',pasto:'Colazione',food:'2–3 uova strapazzate + pomodoro crudo',note:'3 min in padella',carry:null},
    {id:'m4b',pasto:'Pranzo',food:'Macinato al pomodoro (da mercoledì)',note:'Da frigo',carry:null},
    {id:'m4c',pasto:'Cena',food:'Pasta e ceci con aglio e rosmarino',note:'100g pasta + 150g ceci — DOPPIO',carry:'📦 Porta venerdì: pasta e ceci'},
  ]},
  {day:'Venerdì',bc:'b-blue',meals:[
    {id:'m5a',pasto:'Colazione',food:'Yogurt greco 0% + frutti di bosco',note:'150g yogurt',carry:null},
    {id:'m5b',pasto:'Pranzo',food:'Pasta e ceci (da giovedì)',note:'Da frigo',carry:null},
    {id:'m5c',pasto:'Cena',food:'Pollo/tacchino + verdure al forno',note:'180g carne — weekend!',carry:null},
  ]},
  {day:'Sabato',bc:'b-green',meals:[
    {id:'m6a',pasto:'Colazione',food:'2–3 uova strapazzate + pomodoro crudo',note:'3 min in padella',carry:null},
    {id:'m6b',pasto:'Pranzo',food:'Tonno al naturale + fagioli + insalata',note:'2 scatolette tonno + 150g fagioli',carry:null},
    {id:'m6c',pasto:'Cena',food:'Manzo alla piastra + verdure grigliate',note:'180g carne',carry:null},
  ]},
];

let state = {};
const SK = 'life_tracker_v1';

function load() {
  try { state = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { state = {}; }
}
function save() {
  try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e) {}
}

function toggle(id) {
  state[id] = !state[id];
  save();
  render();
}

function resetAll() { state = {}; save(); render(); }
function resetSection(s) {
  const ids = s==='routine' ? ROUTINE.map(r=>r.id)
    : s==='workout' ? WORKOUT.flatMap(d=>d.ex.map(e=>e.id))
    : MENU.flatMap(d=>d.meals.map(m=>m.id));
  ids.forEach(id => delete state[id]);
  save(); render();
}

function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

function itemHTML(id, title, sub, badge, bc, carry) {
  const done = !!state[id];
  return `
    ${carry && !done ? `<div class="carry-note">📦 ${carry}</div>` : ''}
    <div class="item ${done?'done':''}" onclick="toggle('${id}');render()">
      <div class="check">${done?'✓':''}</div>
      <div class="item-body">
        <div class="item-title">${title}</div>
        <div class="item-sub">${sub}</div>
      </div>
      ${badge ? `<span class="badge ${bc}">${badge}</span>` : ''}
    </div>`;
}

function render() {
  const days = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const d = new Date();
  document.getElementById('date-chip').textContent = `${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;

  const rDone = ROUTINE.filter(r=>state[r.id]).length, rTot = ROUTINE.length;
  const wAll = WORKOUT.flatMap(d=>d.ex), wDone = wAll.filter(e=>state[e.id]).length, wTot = wAll.length;
  const mAll = MENU.flatMap(d=>d.meals), mDone = mAll.filter(m=>state[m.id]).length, mTot = mAll.length;

  document.getElementById('s-routine').textContent = `${rDone}/${rTot}`;
  document.getElementById('s-workout').textContent = `${wDone}/${wTot}`;
  document.getElementById('s-menu').textContent = `${mDone}/${mTot}`;
  document.getElementById('p-routine').style.width = Math.round(rDone/rTot*100)+'%';
  document.getElementById('p-workout').style.width = Math.round(wDone/wTot*100)+'%';
  document.getElementById('p-menu').style.width = Math.round(mDone/mTot*100)+'%';

  const total = rTot+wTot+mTot, totalDone = rDone+wDone+mDone;
  const pct = Math.round(totalDone/total*100);
  const dots = Array.from({length:7},(_,i)=>`<div class="streak-dot ${i<Math.round(pct/100*7)?'done':''}"></div>`).join('');
  document.getElementById('streak-bar').innerHTML = dots;

  const next = ROUTINE.filter(r=>!state[r.id]).slice(0,4);
  document.getElementById('dash-next').innerHTML = next.length
    ? next.map(r=>itemHTML(r.id, r.title, r.time, r.badge, r.bc, null)).join('')
    : `<div class="next-empty">✓ Routine completata oggi!</div>`;

  document.getElementById('routine-list').innerHTML = ROUTINE.map(r=>itemHTML(r.id,r.title,`${r.time} — ${r.sub}`,r.badge,r.bc,null)).join('');

  document.getElementById('workout-list').innerHTML = WORKOUT.map(day=>`
    <div class="day-header">
      <span class="day-name">${day.day}</span>
      <span class="badge ${day.bc}">${day.type}</span>
    </div>
    ${day.ex.map(ex=>itemHTML(ex.id,ex.name,ex.sets,'','',null)).join('')}
  `).join('');

  document.getElementById('menu-list').innerHTML = MENU.map(day=>`
    <div class="day-header">
      <span class="day-name">${day.day}</span>
      <span class="badge ${day.bc}">${day.bc==='b-orange'?'Libero':day.bc==='b-blue'?'Carbo':'Proteico'}</span>
    </div>
    ${day.meals.map(m=>itemHTML(m.id,`${m.pasto} — ${m.food}`,m.note,'','',m.carry)).join('')}
  `).join('');
}

load();
render();
</script>
</body>
</html>
